name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on PR updates; never cancel main runs — every merge
# gets a full post-merge verification (and seeds the yarn cache for PRs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Prettier
        run: yarn prettier:check

      - name: Test
        run: yarn test:all

      # Build the publishable packages so packaging breakage (entry points,
      # d.ts generation) fails in CI rather than during a tagged release.
      - name: Build packages
        run: yarn workspaces foreach -A --topological --include '@massdriver/*' run build
